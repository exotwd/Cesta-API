services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: cesta
      POSTGRES_PASSWORD: cesta
      POSTGRES_DB: cesta
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://cesta:cesta@postgres:5432/cesta
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-only-change-me
      REFRESH_TOKEN_SECRET: dev-only-change-me-too
      STORAGE_DIR: /app/storage
      USE_MOCK_DATA: "true"
      API_PORT: 8080
      RUST_LOG: info
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/app/storage

  realtime-worker:
    build:
      context: .
      dockerfile: infra/docker/realtime-worker.Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      RUST_LOG: info

volumes:
  postgres-data:

