services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgis/postgis:16-3.4}
    restart: unless-stopped
    shm_size: ${POSTGRES_SHM_SIZE:-512mb}
    environment:
      POSTGRES_USER: cesta
      POSTGRES_PASSWORD: cesta
      POSTGRES_DB: cesta
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"

  api:
    build:
      context: .
      dockerfile: infra/docker/runtime-services.Dockerfile
      target: api
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://cesta:cesta@postgres:5432/cesta
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-only-change-me
      REFRESH_TOKEN_SECRET: dev-only-change-me-too
      STORAGE_DIR: /app/storage
      ROUTING_SNAPSHOT_FILES_TO_KEEP: ${ROUTING_SNAPSHOT_FILES_TO_KEEP:-2}
      USE_MOCK_DATA: "false"
      API_PORT: 8070
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      RUST_LOG: info
      CD_TICKET_API_BASE_URL: ${CD_TICKET_API_BASE_URL:-https://ticket-api.cd.cz/v1}
      CD_TICKET_API_USER: ${CD_TICKET_API_USER:-}
      CD_TICKET_API_PRIVATE_KEY_FILE: ${CD_TICKET_API_PRIVATE_KEY_FILE:-}
      CD_TICKET_API_PRIVATE_KEY_PEM: ${CD_TICKET_API_PRIVATE_KEY_PEM:-}
      CD_TICKET_API_DESCRIPTION: ${CD_TICKET_API_DESCRIPTION:-Cesta API}
      CD_TICKET_API_LANGUAGE: ${CD_TICKET_API_LANGUAGE:-cs}
      CD_TICKET_API_TIMEOUT_SECONDS: ${CD_TICKET_API_TIMEOUT_SECONDS:-15}
      CD_TICKET_REFUND_RECONCILE_SECONDS: ${CD_TICKET_REFUND_RECONCILE_SECONDS:-300}
      CD_TICKET_CORRELATION_TOLERANCE_MINUTES: ${CD_TICKET_CORRELATION_TOLERANCE_MINUTES:-10}
      PAYMENT_PROVIDER_BASE_URL: ${PAYMENT_PROVIDER_BASE_URL:-}
      PAYMENT_PROVIDER_API_KEY: ${PAYMENT_PROVIDER_API_KEY:-}
      MOBILE_CHECKOUT_RETURN_URL: ${MOBILE_CHECKOUT_RETURN_URL:-jedes://ticketing/checkout/return}
      MOBILE_CHECKOUT_CANCEL_URL: ${MOBILE_CHECKOUT_CANCEL_URL:-jedes://ticketing/checkout/cancel}
    ports:
      - "8070:8070"
    volumes:
      - ./storage:/app/storage

  realtime-worker:
    build:
      context: .
      dockerfile: infra/docker/runtime-services.Dockerfile
      target: realtime-worker
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://cesta:cesta@postgres:5432/cesta
      REDIS_URL: redis://redis:6379
      PID_API_TOKEN: ${PID_API_TOKEN:-}
      PID_VEHICLE_POSITIONS_JSON_URL: ${PID_VEHICLE_POSITIONS_JSON_URL:-https://api.golemio.cz/v2/vehiclepositions}
      PID_POLL_INTERVAL_SECONDS: ${PID_POLL_INTERVAL_SECONDS:-20}
      IDS_JMK_VEHICLES_URL: ${IDS_JMK_VEHICLES_URL:-https://kordis-jmk.cz/gtfs/gtfsReal.dat}
      IDS_JMK_POLL_INTERVAL_SECONDS: ${IDS_JMK_POLL_INTERVAL_SECONDS:-30}
      DUK_ENABLED: ${DUK_ENABLED:-false}
      DUK_POLL_INTERVAL_SECONDS: ${DUK_POLL_INTERVAL_SECONDS:-30}
      USE_MOCK_REALTIME: "false"
      RUST_LOG: info
    restart: unless-stopped

  data-pipeline:
    image: cesta-data-pipeline:local
    build:
      context: .
      dockerfile: infra/docker/data-pipeline.Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://cesta:cesta@postgres:5432/cesta
      STORAGE_DIR: /app/storage
      GGU_LATEST_BASE_URL: https://data.jr.ggu.cz/results/latest/
      RAW_IMPORT_RUNS_TO_KEEP: ${RAW_IMPORT_RUNS_TO_KEEP:-3}
      RAW_INCOMPLETE_RUN_MAX_AGE_HOURS: ${RAW_INCOMPLETE_RUN_MAX_AGE_HOURS:-24}
      DB_IMPORT_RUNS_TO_KEEP: ${DB_IMPORT_RUNS_TO_KEEP:-1}
      RUST_LOG: info
    volumes:
      - ./storage:/app/storage
    profiles:
      - tools

  schedule-updater:
    image: cesta-data-pipeline:local
    build:
      context: .
      dockerfile: infra/docker/data-pipeline.Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://cesta:cesta@postgres:5432/cesta
      STORAGE_DIR: /app/storage
      PID_GTFS_URL: https://data.pid.cz/PID_GTFS.zip
      PID_LINES_URL: https://data.pid.cz/geodata/Linky_7d_WGS84.json
      SCHEDULE_UPDATE_INTERVAL_SECONDS: ${SCHEDULE_UPDATE_INTERVAL_SECONDS:-21600}
      RAW_IMPORT_RUNS_TO_KEEP: ${RAW_IMPORT_RUNS_TO_KEEP:-3}
      RAW_INCOMPLETE_RUN_MAX_AGE_HOURS: ${RAW_INCOMPLETE_RUN_MAX_AGE_HOURS:-24}
      DB_IMPORT_RUNS_TO_KEEP: ${DB_IMPORT_RUNS_TO_KEEP:-1}
      RUST_LOG: info
    command: ["run-scheduler"]
    restart: unless-stopped
    volumes:
      - ./storage:/app/storage

volumes:
  postgres-data:

