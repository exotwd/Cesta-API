services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: cesta
      POSTGRES_PASSWORD: cesta
      POSTGRES_DB: cesta
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://cesta:cesta@postgres:5432/cesta
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-only-change-me
      REFRESH_TOKEN_SECRET: dev-only-change-me-too
      STORAGE_DIR: /app/storage
      USE_MOCK_DATA: "false"
      API_PORT: 8070
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      RUST_LOG: info
    ports:
      - "8070:8070"
    volumes:
      - ./storage:/app/storage

  realtime-worker:
    build:
      context: .
      dockerfile: infra/docker/realtime-worker.Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      RUST_LOG: info

  data-pipeline:
    build:
      context: .
      dockerfile: infra/docker/data-pipeline.Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://cesta:cesta@postgres:5432/cesta
      STORAGE_DIR: /app/storage
      GGU_LATEST_BASE_URL: https://data.jr.ggu.cz/results/latest/
      RUST_LOG: info
    volumes:
      - ./storage:/app/storage
    profiles:
      - tools

volumes:
  postgres-data:

